# Builds the Windows installer and publishes it to GitHub Releases whenever a
# version tag (v0.3.0, v1.0.0, …) is pushed. The tag must match the "version"
# in package.json — latest.yml is generated from package.json.
#
# electron-builder runs with --publish never: its own GitHub publisher races
# parallel asset uploads and creates duplicate releases. A single
# action-gh-release step uploads everything to one release instead.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build installer
        run: npm run package -- --publish never

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
